<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Encuesta</title>
    <link rel="icon" href="Imagenes/logo.jpg" type="image/png">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/login.css"> 

    <style>
        /* =========================================
           ESTILOS COMPACTADOS PARA QUE QUEPA EN PANTALLA
           ========================================= */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px; /* Reducido para pantallas pequeñas */
            box-sizing: border-box;
        }

        .login-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            max-width: 550px; 
            width: 100%;
            /* 🔽 Redujimos el padding interior de la tarjeta */
            padding: 25px 30px; 
            text-align: center;
            box-sizing: border-box;
        }
        
        /* 🔽 Redujimos el logo y los márgenes de los títulos */
        .logo-img { width: 170px; height: auto; margin-bottom: 5px; }
        .app-title { font-size: 1rem; line-height: 1.2; margin-bottom: 2px; color: #333; }
        .page-subtitle { color: #7c1225; margin-bottom: 15px; font-size: 1.15rem; font-weight: 700; margin-top: 5px; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            /* 🔽 Redujimos el espacio entre filas y columnas */
            gap: 10px 15px; 
            text-align: left;
        }
        .full-width { grid-column: span 2; }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        .form-group label { 
            font-size: 0.8rem; 
            margin-bottom: 4px; 
            font-weight: 600; 
            color: #444; 
        }
        
        /* 🔽 Hicimos los inputs ligeramente más delgados */
        .form-group input, .form-group select {
            width: 100%; 
            box-sizing: border-box; 
            padding: 7px 10px;
            font-size: 0.9rem; 
            border: 1px solid #ccc; 
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: #7c1225;
            outline: none;
            box-shadow: 0 0 0 3px rgba(124, 18, 37, 0.1);
        }

        .input-especificar {
            margin-top: 6px;
            display: none;
        }

        /* 🔽 Botón más compacto y pegado al formulario */
        .btn-login {
            margin-top: 15px; 
            padding: 10px; 
            background-color: #7c1225;
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold;
            font-size: 0.95rem;
            transition: background-color 0.2s;
        }
        .btn-login:hover { background-color: #5a0d1b; }

        /* 🔽 Separador visual más discreto */
        .section-divider {
            grid-column: span 2;
            border-bottom: 1px solid #eee;
            margin: 8px 0 2px 0;
            padding-bottom: 3px;
            color: #888;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .ubicacion-feedback { 
            font-size: 0.75rem; 
            margin-top: 4px; 
            display: block; 
            min-height: 16px; 
        }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; gap: 10px; }
            .full-width, .section-divider { grid-column: span 1; }
            .login-card { padding: 20px 15px; }
        }
    </style>
</head>
<body>

    <div class="login-card">
        
        <img src="Imagenes/logo.png" alt="Logo" class="logo-img">
        <h1 class="app-title">Evaluación de Madurez</h1>
        <h2 class="page-subtitle">Registro Institucional</h2>
        
        <form id="registroForm" class="form-grid" novalidate>
            
            <div class="section-divider">Datos del Usuario</div>

            <div class="form-group full-width">
                <label>Nombre del Responsable <span style="color:red">*</span></label>
                <input type="text" id="nombre" required placeholder="Tu nombre completo">
            </div>

            <div class="form-group full-width">
                <label>Correo Electrónico <span style="color:red">*</span></label>
                <input type="email" id="email" required placeholder="correo@ejemplo.com">
            </div>

            <div class="form-group">
                <label>Contraseña <span style="color:red">*</span></label>
                <input type="password" id="pass1" required placeholder="Crea una contraseña">
            </div>

            <div class="form-group">
                <label>Confirmar Contraseña <span style="color:red">*</span></label>
                <input type="password" id="pass2" required placeholder="Repite la contraseña">
            </div>


            <div class="section-divider">Perfil del Archivo</div>

            <div class="form-group full-width">
                <label>Nombre Oficial de la Institución <span style="color:red">*</span></label>
                <input type="text" id="institucion" required placeholder="Ej. Archivo Histórico...">
            </div>

            <div class="form-group">
                <label>Tipo de institución <span style="color:red">*</span></label>
                <select id="tipo_institucion" required>
                    <option value="">Seleccione...</option>
                    <option value="Pública">Pública</option>
                    <option value="Privada">Privada</option>
                    <option value="Organización de la Sociedad Civil">Org. de la Sociedad Civil</option>
                    <option value="Mixta">Mixta</option>
                    <option value="Otro">Otro</option>
                </select>
                <input type="text" id="tipo_institucion_otro" class="input-especificar" placeholder="Especifique...">
            </div>

            <div class="form-group">
                <label>Adscripción <span style="color:#888; font-weight:normal;">(Opcional)</span></label>
                <input type="text" id="adscripcion" placeholder="¿Depende de alguna organización?">
            </div>

            <div class="form-group full-width">
                <label>Dirección / Ubicación Postal <span style="color:red">*</span></label>
                <input type="text" id="ubicacion_texto" required placeholder="Calle, Número, Colonia, Ciudad, Estado...">
                <small id="statusUbicacion" class="ubicacion-feedback">Escriba una dirección para geolocalizar.</small>
                
                <input type="hidden" id="latitud">
                <input type="hidden" id="longitud">
            </div>

            <button type="submit" class="btn-login full-width">Crear Cuenta</button>
        </form>

        <div class="login-footer" style="margin-top: 12px; font-size: 0.85rem; color: #555;">
            ¿Ya tienes cuenta? <a href="login.html" style="color: #7c1225; font-weight: bold; text-decoration: none;">Inicia Sesión aquí</a>
        </div>
    </div>

    <script>
        const API_URL = 'https://api-cuestionario.onrender.com';

        // Lógica del Select "Otro"
        const selectTipo = document.getElementById('tipo_institucion');
        const inputOtroTipo = document.getElementById('tipo_institucion_otro');

        selectTipo.addEventListener('change', function() {
            if (this.value === 'Otro') {
                inputOtroTipo.style.display = 'block';
                inputOtroTipo.required = true;
            } else {
                inputOtroTipo.style.display = 'none';
                inputOtroTipo.required = false;
                inputOtroTipo.value = '';
            }
        });

        // Geolocalización
        const inputUbicacion = document.getElementById('ubicacion_texto');
        const statusUbicacion = document.getElementById('statusUbicacion');
        const hiddenLat = document.getElementById('latitud');
        const hiddenLon = document.getElementById('longitud');

        let timeoutBusqueda = null;

        inputUbicacion.addEventListener('input', function() {
            clearTimeout(timeoutBusqueda);
            hiddenLat.value = ''; hiddenLon.value = '';
            statusUbicacion.innerHTML = '';
            if (this.value.trim().length > 5) {
                timeoutBusqueda = setTimeout(buscarUbicacion, 1000);
            }
        });

        inputUbicacion.addEventListener('blur', function() {
            if (this.value.trim().length > 5 && !hiddenLat.value) buscarUbicacion();
        });

        function buscarUbicacion() {
            const query = inputUbicacion.value.trim();
            if (query.length < 5) return;

            statusUbicacion.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Validando en mapa...';
            statusUbicacion.style.color = '#0056b3';

            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1&addressdetails=1`)
                .then(res => res.json())
                .then(data => {
                    if (data && data.length > 0) {
                        const lugar = data[0];
                        hiddenLat.value = lugar.lat;
                        hiddenLon.value = lugar.lon;
                        statusUbicacion.innerHTML = `<i class="fas fa-check-circle"></i> Ubicación validada.`;
                        statusUbicacion.style.color = '#28a745';
                    } else {
                        statusUbicacion.innerHTML = '<i class="fas fa-exclamation-triangle"></i> No se encontró ubicación exacta, pero se guardará el texto.';
                        statusUbicacion.style.color = '#fd7e14';
                    }
                })
                .catch(() => statusUbicacion.innerHTML = ''); 
        }

        // Envío del Formulario
        document.getElementById('registroForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const institucion = document.getElementById('institucion').value.trim();
            const nombre = document.getElementById('nombre').value.trim();
            const email = document.getElementById('email').value.trim();
            const pass1 = document.getElementById('pass1').value.trim();
            const pass2 = document.getElementById('pass2').value.trim();
            
            const tipo_select = document.getElementById('tipo_institucion').value;
            const tipo_otro = document.getElementById('tipo_institucion_otro').value.trim();
            const tipo_final = tipo_select === 'Otro' ? `Otro: ${tipo_otro}` : tipo_select;
            const adscripcion = document.getElementById('adscripcion').value.trim();
            
            const ubicacion_texto = document.getElementById('ubicacion_texto').value.trim();
            const latitud = document.getElementById('latitud').value;
            const longitud = document.getElementById('longitud').value;

            if (!institucion || !nombre || !email || !pass1 || !pass2 || !tipo_select || !ubicacion_texto) {
                Swal.fire({ icon: 'warning', title: 'Faltan datos', text: 'Complete los campos con (*).', confirmButtonColor: '#7c1225' });
                return;
            }

            if (tipo_select === 'Otro' && !tipo_otro) {
                Swal.fire({ icon: 'warning', title: 'Faltan datos', text: 'Especifique el tipo de institución.', confirmButtonColor: '#7c1225' });
                return;
            }

            if (pass1 !== pass2) {
                Swal.fire({ icon: 'error', title: 'Error', text: 'Las contraseñas no coinciden.', confirmButtonColor: '#7c1225' });
                return;
            }

            const payload = { 
                institucion, nombre, email, password: pass1,
                ubicacion: ubicacion_texto, latitud: latitud || null, longitud: longitud || null,
                tipo_institucion: tipo_final, adscripcion
            };

            try {
                Swal.fire({ title: 'Creando cuenta...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

                const response = await fetch(`${API_URL}/auth/registro`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) {
                    Swal.fire({
                        icon: 'success', title: '¡Registro Exitoso!', text: 'Redirigiendo...',
                        confirmButtonColor: '#7c1225', timer: 1500, showConfirmButton: false
                    }).then(() => window.location.href = 'login.html');
                } else {
                    Swal.fire({ icon: 'error', title: 'Error', text: data.error || 'Problema al registrar.', confirmButtonColor: '#7c1225' });
                }
            } catch (error) {
                console.error(error);
                Swal.fire({ icon: 'error', title: 'Error de red', text: 'Sin conexión al servidor.', confirmButtonColor: '#7c1225' });
            }
        });
    </script>
</body>
</html>
