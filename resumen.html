<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resumen de Resultados</title>
    
    <link rel="stylesheet" href="css/resumen.css"> 
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="icon" href="Imagenes/logo.jpg" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="resumen-container">
        <div class="header-resumen">
            <img src="Imagenes/logo.png" alt="Logo" class="logo" />
            <div style="margin-left: 230px;"> 
                <h1>📊 Resultados del Diagnóstico</h1>
                <p class="intro">Informe ejecutivo de evaluación.</p>
            </div>
        </div>

        <div class="dashboard-grid">
            
            <div class="dashboard-left">
                
                <div id="cardPuntaje" class="card-puntaje">
    
                    <div class="icon-container">
                        <i class="fas fa-clipboard-check"></i>
                    </div>

                    <h2 class="titulo-estado">Diagnóstico Finalizado</h2>
                    
                    <div class="linea-decorativa"></div>
                    
                    <p class="mensaje-final">
                        <span class="texto-grande">¡Gracias por su tiempo!</span>
                        <br>
                        La información ha sido procesada correctamente.
                        <br><br>
                        A continuación encontrará un <strong> diagnóstico </strong> para cada sección.
                    </p>

                </div>

                <div class="actions-panel">
                    <button onclick="window.print()" class="btn-imprimir">
                        <i class="fas fa-print"></i> Imprimir Reporte
                    </button>
                    <button id="btnEnviarCorreo" onclick="enviarCorreo()" class="btn-correo">
                        <i class="fas fa-envelope"></i> Enviar a mi correo
                    </button>
                    <a href="login.html" class="link-salir">
                        <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                    </a>
                </div>
            </div>

            <div class="dashboard-right">
                <h3 class="titulo-seccion">Desglose por secciones y recomendaciones</h3>
                <div class="tabla-container">
                    <table class="tabla-desglosada">
                        <thead>
                            <tr>
                                <th>Sección evaluada</th>
                                <th style="text-align: right; width: 50px;">Ver</th>
                            </tr>
                        </thead>
                        <tbody id="tablaBody"></tbody>
                    </table>
                </div>
            </div>
        </div> 
    </div>

    <script>
        const API_URL = 'https://api-cuestionario.onrender.com';

        const MAXIMOS_POR_SECCION = {
            1: 0, 2: 5, 3: 21, 4: 34, 5: 81, 6: 40, 7: 5, 8: 7, 9: 4
        };

        const NOMBRES_SECCIONES = {
            1: "Identificación de la Institución", 
            2: "Gestión Institucional", 
            3: "Caracterización del Acervo",
            4: "Inventario y Catalogación", 
            5: "Gestión de información", 
            6: "Recursos Humanos",
            7: "Infraestructura Tecnológica", 
            8: "Normatividad y Procesos", 
            9: "Servicios"
        };

        function hexToRgba(hex, alpha) {
            if (!hex || !hex.startsWith('#')) return 'rgba(108, 117, 125, 0.85)';
            hex = hex.replace('#', '');
            if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
            const r = parseInt(hex.substring(0, 2), 16);
            const g = parseInt(hex.substring(2, 4), 16);
            const b = parseInt(hex.substring(4, 6), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        async function cargarResumen() {
            const idUsuario = localStorage.getItem('idUsuario');
            if(!idUsuario) { window.location.href = 'login.html'; return; }

            try {
                const response = await fetch(`${API_URL}/resumen/${idUsuario}`);
                const data = await response.json();

                if(data.error) { alert(data.error); return; }

                // --- 🤖 PARSEAR DATOS DE LA IA ---
                let analisis = null;
                if (data.analisis_ia) {
                    try {
                        analisis = typeof data.analisis_ia === 'string' ? JSON.parse(data.analisis_ia) : data.analisis_ia;
                    } catch (e) {
                        console.error("Error leyendo JSON de IA:", e);
                    }
                }

                // --- 1. TARJETA IZQUIERDA (DEGRADADO Y TEXTO IA) ---
                const colorInicio = hexToRgba(data.color, 0.95);
                const colorFin = hexToRgba(data.color, 0.40);
                document.getElementById('cardPuntaje').style.background = `linear-gradient(135deg, ${colorInicio} 0%, ${colorFin} 100%)`;

                // Inyectamos el resumen general de la IA si existe
                const contenedorMensaje = document.querySelector('.mensaje-final');
                if (analisis && analisis.resumen_general) {
                    contenedorMensaje.innerHTML = `
                        <span style="font-size:1.15em; font-weight:800; display:block; margin-bottom:12px; letter-spacing:0.5px; text-shadow:0 1px 2px rgba(0,0,0,0.2);">🤖 Análisis Ejecutivo IA</span>
                        <div style="font-size:1.05rem; line-height:1.6; font-weight:400; opacity:0.98; text-align:justify;">
                            ${analisis.resumen_general}
                        </div>
                    `;
                }

                // --- 2. TABLA DERECHA ---
                const tbody = document.getElementById('tablaBody');
                tbody.innerHTML = '';
                
                Object.keys(data.secciones).sort((a,b) => a-b).forEach(sec => {
                    const numSec = parseInt(sec);
                    if(isNaN(numSec)) return; 

                    const puntajeObtenido = data.secciones[sec];
                    const puntajeMaximo = MAXIMOS_POR_SECCION[sec] || 1; 
                    
                    let colorCuadrito = '#6c757d'; 
                    let recomendacionTexto = "";

                    // Lógica del Semáforo para el color
                    if (numSec === 1) {
                        colorCuadrito = '#28a745'; 
                    } else {
                        const porcentaje = (puntajeObtenido / puntajeMaximo) * 100;
                        if (porcentaje >= 100) {
                            colorCuadrito = '#28a745'; 
                        } else if (porcentaje >= 50) {
                            colorCuadrito = '#ffc107'; 
                        } else {
                            colorCuadrito = '#dc3545'; 
                        }
                    }

                    // 🤖 LÓGICA DE TEXTOS: Prioridad a Gemini, respaldo a tus textos
                    if (analisis && analisis.secciones && analisis.secciones[sec]) {
                        recomendacionTexto = analisis.secciones[sec];
                    } else {
                        // Respaldo original
                        if (numSec === 1) {
                            recomendacionTexto = "ℹ️ <b>Información General:</b> Datos de contacto y ubicación.";
                        } else {
                            const porcentaje = (puntajeObtenido / puntajeMaximo) * 100;
                            if (porcentaje >= 100) {
                                recomendacionTexto = "✅ <b>Nivel consolidado:</b> La institución cumple satisfactoriamente con los estándares.";
                            } else if (porcentaje >= 50) {
                                recomendacionTexto = "⚠️ <b>Nivel en desarrollo:</b> La institución muestra avances, pero aún hay áreas que requieren atención para alcanzar un nivel óptimo.";
                            } else {
                                recomendacionTexto = "🛑 <b>Nivel minimo:</b> Se han identificado carencias que comprometen la gestión. Se recomienda implementar un plan de acción para mejorar las condiciones mínimas de operación.";
                            }
                        }
                    }

                    // Fila Principal
                    const trPrincipal = document.createElement('tr');
                    trPrincipal.className = 'fila-seccion';
                    trPrincipal.onclick = () => toggleDetalle(sec);

                    trPrincipal.innerHTML = `
                        <td>
                            <span class="indicador-color" style="background-color: ${colorCuadrito};"></span>
                            <span class="texto-seccion">${sec}. ${NOMBRES_SECCIONES[sec] || 'General'}</span>
                        </td>
                        <td>
                            <button class="btn-toggle" id="btn-${sec}">
                                <i class="fas fa-chevron-down"></i>
                            </button>
                        </td>
                    `;

                    // Fila Detalle
                    const trDetalle = document.createElement('tr');
                    trDetalle.id = `detalle-${sec}`;
                    trDetalle.className = 'fila-detalle';
                    trDetalle.innerHTML = `
                        <td colspan="2" style="padding: 0; border: none;">
                            <div class="contenido-detalle">
                                ${recomendacionTexto}
                            </div>
                        </td>
                    `;

                    tbody.appendChild(trPrincipal);
                    tbody.appendChild(trDetalle);
                });

            } catch (error) { 
                console.error(error);
                Swal.fire("Error", "No se pudo conectar con el servidor.", "error");
            }
        }

        function toggleDetalle(id) {
            const filaDetalle = document.getElementById(`detalle-${id}`);
            const btn = document.getElementById(`btn-${id}`);
            const filaPrincipal = btn.closest('tr');

            document.querySelectorAll('.fila-detalle').forEach(el => {
                if (el.id !== `detalle-${id}`) el.classList.remove('visible');
            });
            document.querySelectorAll('.fila-seccion').forEach(el => {
                if (el !== filaPrincipal) el.classList.remove('activa');
            });

            if (filaDetalle.classList.contains('visible')) {
                filaDetalle.classList.remove('visible');
                filaPrincipal.classList.remove('activa');
            } else {
                filaDetalle.classList.add('visible');
                filaPrincipal.classList.add('activa');
            }
        }

        async function enviarCorreo() {
            const idUsuario = localStorage.getItem('idUsuario');
            const btn = document.getElementById('btnEnviarCorreo');
            
            // Estado de carga
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Enviando...';

            try {
                const response = await fetch(`${API_URL}/api/enviar-correo-resultados`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ idUsuario: idUsuario })
                });

                const resultado = await response.json();

                if (response.ok) {
                    // Intentamos recuperar el correo de la respuesta del servidor
                    // Si el backend no lo devuelve, decimos "tu correo registrado"
                    const correoDestino = resultado.email || resultado.correo || "tu dirección de correo registrada";

                    Swal.fire({
                        title: '¡Correo Enviado!',
                        html: `El reporte ha sido enviado exitosamente a:<br><strong>${correoDestino}</strong><br><br><small>Por favor, revisa tu bandeja de entrada y la carpeta de spam.</small>`,
                        icon: 'success',
                        confirmButtonColor: '#7c1225'
                    });
                    
                    btn.innerHTML = '<i class="fas fa-check"></i> Enviado';
                } else {
                    throw new Error(resultado.error || 'Error desconocido');
                }
            } catch (error) {
                console.error(error);
                Swal.fire('Error', 'No se pudo enviar el correo en este momento.', 'error');
                
                // Restaurar botón
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-envelope"></i> Enviar a mi correo';
            }
        }
        
        document.addEventListener('DOMContentLoaded', cargarResumen);
    </script>
</body>
</html>
